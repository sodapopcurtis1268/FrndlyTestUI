                  const status = t.results?.[0]?.status ?? 'unknown';
                  const duration = t.results?.[0]?.duration ?? 0;
                  const title = [suite.title, spec.title].filter(Boolean).join(' › ');
                  suites.push({ title, status, duration });
                });
              });
            }
            (data.suites ?? []).forEach(walk);
          } catch (e) {
            console.error('Could not parse results.json:', e.message);
          }

          const total   = stats.expected + stats.unexpected + stats.skipped + stats.flaky;
          const passed  = stats.expected;
          const failed  = stats.unexpected;
          const skipped = stats.skipped;
          const flaky   = stats.flaky;
          const suite   = process.env.SUITE_NAME ?? 'Tests';
          const artifact = process.env.ARTIFACT_NAME ?? 'playwright-report';

          // Visual progress bar — 10 blocks, green for passed, red for failed, grey for skipped
          const BLOCKS = 10;
          const greenCount = total > 0 ? Math.round(((passed + flaky) / total) * BLOCKS) : 0;
          const redCount   = failed > 0 ? Math.max(1, BLOCKS - greenCount) : 0;
          const greyCount  = BLOCKS - greenCount - redCount;
          const bar = '🟩'.repeat(greenCount) + '🟥'.repeat(redCount) + '⬜'.repeat(greyCount);
          const pct = total > 0 ? Math.round(((passed + flaky) / total) * 100) : 0;

          const successWord = passed === 1 ? 'success' : 'successes';
          const failureWord = failed === 1 ? 'failure' : 'failures';
          const headerIcon  = failed > 0 ? '📺❌' : '📺✅';

          const lines = [];
          lines.push(`## ${headerIcon} Frndly TV — ${suite}`);
          lines.push('');
          lines.push(`🎬 Video **'${suite}'** started with **${passed}** ${successWord} and **${failed}** ${failureWord}`);
          lines.push('');
          lines.push(`${bar}  **${pct}%** &nbsp;(${passed + flaky}/${total} passed${skipped > 0 ? ` · ${skipped} skipped` : ''}${flaky > 0 ? ` · ${flaky} flaky` : ''})`);
          lines.push('');

          if (failed > 0) {
            lines.push('### ❌ Failures');
            suites.filter(s => s.status === 'failed').forEach(s => {
              lines.push(`- **${s.title}** (${(s.duration/1000).toFixed(1)} s)`);
            });
            lines.push('');
          }

          if (flaky > 0) {
            lines.push('### 🔁 Flaky (passed on retry)');
            suites.filter(s => s.status === 'flaky').forEach(s => {
              lines.push(`- ${s.title}`);
            });
            lines.push('');
          }

          if (skipped > 0) {
            lines.push('<details><summary>⏭️ Skipped tests</summary>');
            lines.push('');
            suites.filter(s => s.status === 'skipped').forEach(s => {
              lines.push(`- ${s.title}`);
            });
            lines.push('');
            lines.push('</details>');
            lines.push('');
          }

          lines.push(`> 📄 Download **${artifact}** artifact above for videos, screenshots, and measurements.`);

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          console.log('Executive summary written.');
          EOF

      - name: Upload Playwright report (${{ matrix.row }})
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-row-${{ matrix.row }}
          path: playwright/playwright-report/
          retention-days: 30

      - name: Upload test artifacts (${{ matrix.row }})
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-row-${{ matrix.row }}
          path: playwright/test-results/
          retention-days: 7

