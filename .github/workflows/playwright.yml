name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:    # Allows manual trigger from the GitHub Actions UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playwright/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: playwright

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: playwright

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: playwright
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          WATCH_URL: ${{ secrets.WATCH_URL }}
          USERNAME: ${{ secrets.FRNDLY_USERNAME }}
          PASSWORD: ${{ secrets.FRNDLY_PASSWORD }}
          VIDEO_PLAY_SECONDS: ${{ secrets.VIDEO_PLAY_SECONDS || '5' }}
          VIDEO_TIMEOUT_SECONDS: ${{ secrets.VIDEO_TIMEOUT_SECONDS || '30' }}

      # Always upload the HTML report so you can review results even on failure
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright/playwright-report/
          retention-days: 30

      # Upload test result artifacts (videos, screenshots, traces) on failure
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: playwright/test-results/
          retention-days: 7
