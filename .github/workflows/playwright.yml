name: Playwright Tests

on:
  push:
    branches: [main, feature/playwright-web-suite]
  pull_request:
  workflow_dispatch:    # Allows manual trigger from the GitHub Actions UI

# Each job repeats the install sequence (checkout → node → npm ci → browsers)
# since YAML anchors are not supported in GitHub Actions and composite actions
# would add overhead for what is a short 4-step sequence.

jobs:

  # ── k6 API smoke ───────────────────────────────────────────────────────────
  # Fast API gate: confirms all 7 frndlytv-api endpoints are reachable and
  # returning 200. Runs in ~10s. Blocks the PR if any endpoint is down.
  # Requires FRNDLY_SESSION_ID secret — refresh from playwright/.auth/user.json
  # after running: npx playwright test --project=setup
  k6-smoke:
    name: "k6 API Smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Run k6 API smoke check
        working-directory: playwright
        env:
          FRNDLY_SESSION_ID: ${{ secrets.FRNDLY_SESSION_ID }}
        run: k6 run load-tests/smoke.js

      - name: Upload k6 smoke report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: k6-smoke-report
          path: playwright/load-tests/reports/smoke-report.html
          retention-days: 14

  # ── Smoke ──────────────────────────────────────────────────────────────────
  # Fast sanity check: login, Live Now TTFF, random row TTFF, E2E.
  # Runs on every push/PR. Gate pull requests on this job.
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playwright/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: playwright

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chrome
        working-directory: playwright

      - name: Run smoke tests
        run: npx playwright test --project=smoke
        working-directory: playwright
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          WATCH_URL: ${{ secrets.WATCH_URL }}
          USERNAME: ${{ secrets.FRNDLY_USERNAME }}
          PASSWORD: ${{ secrets.FRNDLY_PASSWORD }}
          VIDEO_PLAY_SECONDS: ${{ secrets.VIDEO_PLAY_SECONDS || '25' }}
          VIDEO_TIMEOUT_SECONDS: ${{ secrets.VIDEO_TIMEOUT_SECONDS || '30' }}
          TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
          TESTRAIL_PROJECT_ID: ${{ secrets.TESTRAIL_PROJECT_ID }}
          TESTRAIL_SUITE_ID: ${{ secrets.TESTRAIL_SUITE_ID }}
          TESTRAIL_RUN_ID: ${{ secrets.TESTRAIL_RUN_ID }}

      - name: Write executive summary
        if: always()
        working-directory: playwright
        env:
          SUITE_NAME: Smoke
          ARTIFACT_NAME: playwright-report-smoke
        run: |
          node - <<'EOF'
          const fs = require('fs');

          let stats = { expected: 0, unexpected: 0, skipped: 0, flaky: 0 };
          let suites = [];

          try {
            const raw = fs.readFileSync('test-results/results.json', 'utf8');
            const data = JSON.parse(raw);
            stats = data.stats ?? stats;

            function walk(suite, parentPath) {
              if (!suite) return;
              const path = [parentPath, suite.title].filter(Boolean).join(' / ');
              (suite.suites ?? []).forEach(s => walk(s, path));
              (suite.specs ?? []).forEach(spec => {
                spec.tests?.forEach(t => {
                  const status = t.results?.[0]?.status ?? 'unknown';
                  const duration = t.results?.[0]?.duration ?? 0;
                  const title = [path, spec.title].filter(Boolean).join(' / ');
                  suites.push({ title, status, duration });
                });
              });
            }
            (data.suites ?? []).forEach(s => walk(s, ''));
          } catch (e) {
            console.error('Could not parse results.json:', e.message);
          }

          const total   = stats.expected + stats.unexpected + stats.skipped + stats.flaky;
          const passed  = stats.expected;
          const failed  = stats.unexpected;
          const skipped = stats.skipped;
          const flaky   = stats.flaky;
          const suite   = process.env.SUITE_NAME ?? 'Tests';
          const artifact = process.env.ARTIFACT_NAME ?? 'playwright-report';

          // Visual progress bar — 10 blocks, green for passed, red for failed, grey for skipped
          const BLOCKS = 10;
          const greenCount = total > 0 ? Math.round(((passed + flaky) / total) * BLOCKS) : 0;
          const redCount   = failed > 0 ? Math.max(1, BLOCKS - greenCount) : 0;
          const greyCount  = BLOCKS - greenCount - redCount;
          const bar = '🟩'.repeat(greenCount) + '🟥'.repeat(redCount) + '⬜'.repeat(greyCount);
          const pct = total > 0 ? Math.round(((passed + flaky) / total) * 100) : 0;

          const successWord = passed === 1 ? 'success' : 'successes';
          const failureWord = failed === 1 ? 'failure' : 'failures';
          const headerIcon  = failed > 0 ? '📺❌' : '📺✅';

          const lines = [];
          lines.push(`## ${headerIcon} Frndly TV — ${suite}`);
          lines.push('');
          lines.push(`🎬 Video **'${suite}'** started with **${passed}** ${successWord} and **${failed}** ${failureWord}`);
          lines.push('');
          lines.push(`${bar}  **${pct}%** &nbsp;(${passed + flaky}/${total} passed${skipped > 0 ? ` · ${skipped} skipped` : ''}${flaky > 0 ? ` · ${flaky} flaky` : ''})`);
          lines.push('');

          if (failed > 0) {
            lines.push('### ❌ Failures');
            suites.filter(s => s.status === 'failed').forEach(s => {
              lines.push(`- **${s.title}** (${(s.duration/1000).toFixed(1)} s)`);
            });
            lines.push('');
          }

          if (flaky > 0) {
            lines.push('### 🔁 Flaky (passed on retry)');
            suites.filter(s => s.status === 'flaky').forEach(s => {
              lines.push(`- ${s.title}`);
            });
            lines.push('');
          }

          if (skipped > 0) {
            lines.push('<details><summary>⏭️ Skipped tests</summary>');
            lines.push('');
            suites.filter(s => s.status === 'skipped').forEach(s => {
              lines.push(`- ${s.title}`);
            });
            lines.push('');
            lines.push('</details>');
            lines.push('');
          }

          lines.push(`> 📄 Download **${artifact}** artifact above for videos, screenshots, and measurements.`);

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          console.log('Executive summary written.');
          EOF

      - name: Upload Playwright report (smoke)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright/playwright-report/
          retention-days: 30

      - name: Upload test artifacts (smoke)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-smoke
          path: playwright/test-results/
          retention-days: 7

  # ── Regression — one job per row (matrix) ──────────────────────────────────
  # Each row runs on its own runner in parallel.
  # fail-fast: false ensures one failing row doesn't cancel the others.
  # Timeout: 20 min per row (vs 120 min for the old combined job).
  regression-row:
    name: "Row — ${{ matrix.row }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        row:
          - blockbusterBoulevard
          - frndlyFanFavorites
          - frndlyFeatured
          - hallmarkHolidays
          - historyOrMystery
          - justAddedMovies
          - leavingThisMonth
          - mostWatched
          - myFavorites
          - newEpisodes
          - recommendedForYou
          - romCom
          - staffPicks
          - timelessClassics
          - trendingNow
          - watchAgain

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: playwright/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: playwright

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chrome
        working-directory: playwright

      - name: Run row test — ${{ matrix.row }}
        run: npx playwright test tests/rows/${{ matrix.row }}.spec.ts --project=regression
        working-directory: playwright
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          WATCH_URL: ${{ secrets.WATCH_URL }}
          USERNAME: ${{ secrets.FRNDLY_USERNAME }}
          PASSWORD: ${{ secrets.FRNDLY_PASSWORD }}
          VIDEO_PLAY_SECONDS: ${{ secrets.VIDEO_PLAY_SECONDS || '25' }}
          VIDEO_TIMEOUT_SECONDS: ${{ secrets.VIDEO_TIMEOUT_SECONDS || '30' }}
          TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
          TESTRAIL_PROJECT_ID: ${{ secrets.TESTRAIL_PROJECT_ID }}
          TESTRAIL_SUITE_ID: ${{ secrets.TESTRAIL_SUITE_ID }}
          TESTRAIL_RUN_ID: ${{ secrets.TESTRAIL_RUN_ID }}

      - name: Write executive summary
        if: always()
        working-directory: playwright
        env:
          SUITE_NAME: "Row — ${{ matrix.row }}"
          ARTIFACT_NAME: "playwright-report-row-${{ matrix.row }}"
        run: |
          node - <<'EOF'
          const fs = require('fs');

          let stats = { expected: 0, unexpected: 0, skipped: 0, flaky: 0 };
          let suites = [];

          try {
            const raw = fs.readFileSync('test-results/results.json', 'utf8');
            const data = JSON.parse(raw);
            stats = data.stats ?? stats;

            function walk(suite, parentPath) {
              if (!suite) return;
              const path = [parentPath, suite.title].filter(Boolean).join(' / ');
              (suite.suites ?? []).forEach(s => walk(s, path));
              (suite.specs ?? []).forEach(spec => {
                spec.tests?.forEach(t => {
                  const status = t.results?.[0]?.status ?? 'unknown';
                  const duration = t.results?.[0]?.duration ?? 0;
                  const title = [path, spec.title].filter(Boolean).join(' / ');
                  suites.push({ title, status, duration });
                });
              });
            }
            (data.suites ?? []).forEach(s => walk(s, ''));
          } catch (e) {
            console.error('Could not parse results.json:', e.message);
          }

          const total   = stats.expected + stats.unexpected + stats.skipped + stats.flaky;
          const passed  = stats.expected;
          const failed  = stats.unexpected;
          const skipped = stats.skipped;
          const flaky   = stats.flaky;
          const suite   = process.env.SUITE_NAME ?? 'Tests';
          const artifact = process.env.ARTIFACT_NAME ?? 'playwright-report';

          // Visual progress bar — 10 blocks, green for passed, red for failed, grey for skipped
          const BLOCKS = 10;
          const greenCount = total > 0 ? Math.round(((passed + flaky) / total) * BLOCKS) : 0;
          const redCount   = failed > 0 ? Math.max(1, BLOCKS - greenCount) : 0;
          const greyCount  = BLOCKS - greenCount - redCount;
          const bar = '🟩'.repeat(greenCount) + '🟥'.repeat(redCount) + '⬜'.repeat(greyCount);
          const pct = total > 0 ? Math.round(((passed + flaky) / total) * 100) : 0;

          const successWord = passed === 1 ? 'success' : 'successes';
          const failureWord = failed === 1 ? 'failure' : 'failures';
          const headerIcon  = failed > 0 ? '📺❌' : '📺✅';

          const lines = [];
          lines.push(`## ${headerIcon} Frndly TV — ${suite}`);
          lines.push('');
          lines.push(`🎬 Video **'${suite}'** started with **${passed}** ${successWord} and **${failed}** ${failureWord}`);
          lines.push('');
          lines.push(`${bar}  **${pct}%** &nbsp;(${passed + flaky}/${total} passed${skipped > 0 ? ` · ${skipped} skipped` : ''}${flaky > 0 ? ` · ${flaky} flaky` : ''})`);
          lines.push('');

          if (failed > 0) {
            lines.push('### ❌ Failures');
            suites.filter(s => s.status === 'failed').forEach(s => {
              lines.push(`- **${s.title}** (${(s.duration/1000).toFixed(1)} s)`);
            });
            lines.push('');
          }

          if (flaky > 0) {
            lines.push('### 🔁 Flaky (passed on retry)');
            suites.filter(s => s.status === 'flaky').forEach(s => {
              lines.push(`- ${s.title}`);
            });
            lines.push('');
          }

          if (skipped > 0) {
            lines.push('<details><summary>⏭️ Skipped tests</summary>');
            lines.push('');
            suites.filter(s => s.status === 'skipped').forEach(s => {
              lines.push(`- ${s.title}`);
            });
            lines.push('');
            lines.push('</details>');
            lines.push('');
          }

          lines.push(`> 📄 Download **${artifact}** artifact above for videos, screenshots, and measurements.`);

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          console.log('Executive summary written.');
          EOF

      - name: Upload Playwright report (${{ matrix.row }})
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-row-${{ matrix.row }}
          path: playwright/playwright-report/
          retention-days: 30

      - name: Upload test artifacts (${{ matrix.row }})
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-row-${{ matrix.row }}
          path: playwright/test-results/
          retention-days: 7

